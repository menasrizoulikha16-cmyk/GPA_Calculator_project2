<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator - Homework Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-primary mb-4">GPA Calculator</h2>
            <form id="gpaForm" action="calculate.php" method="POST">
                <div id="course-list">
                    <div class="row mb-3">
                        <div class="col"><input type="text" name="course[]" class="form-control" placeholder="اسم المادة"></div>
                        <div class="col"><input type="number" name="credits[]" class="form-control" placeholder="الرصيد"></div>
                        <div class="col">
                            <select name="grade[]" class="form-select">
                                <option value="4">A (4.0)</option>
                                <option value="3">B (3.0)</option>
                                <option value="2">C (2.0)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">حساب المعدل</button>
            </form>

            <div class="mt-4">
                <h5>المعدل النهائي:</h5>
                <div class="progress" style="height: 30px;">
                    <div id="gpa-bar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
